name: CI/CD Pipeline to Docker Hub

on:
  push:
    branches: [ "main" ] # Chạy khi có code mới đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Mượn máy ảo Ubuntu của GitHub
    
    steps:
      # 1. Action lấy code từ GitHub
      - name: Checkout mã nguồn
        uses: actions/checkout@v3 
        
      # 2. Action Đăng nhập Docker Hub
      - name: Đăng nhập Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      # 3. Action Đóng gói & Đẩy Image
      - name: Build và Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dockerdemo:v1 # Thay tag v1 bằng version tùy ý
